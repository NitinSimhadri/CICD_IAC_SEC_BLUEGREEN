name: Full DevOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ Checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # ✅ Configure AWS
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 🔥 SONARQUBE SCAN
    - name: SonarQube Scan
      run: |
        mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
        -Dsonar.projectKey=CICD_IAC_SEC_BLUEGREEN \
        -Dsonar.projectName='CICD_IAC_SEC_BLUEGREEN' \
        -Dsonar.host.url=http://3.25.93.252:9000 \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 🔥 BUILD DOCKER IMAGE
    - name: Build Docker Image
      run: docker build -t app ./app

    # 🔥 INSTALL TRIVY
    - name: Install Trivy
      run: |
        sudo apt-get install wget -y
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

    # 🔥 SCAN IMAGE
    - name: Trivy Scan
      run: |
        trivy image app

    # 🔥 LOGIN TO ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | \
        docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}

    # 🔥 PUSH IMAGE
    - name: Push Image
      run: |
        docker tag app:latest ${{ secrets.ECR_URL }}:latest
        docker push ${{ secrets.ECR_URL }}:latest

    # 🔥 FIND TARGET (BLUE/GREEN)
    - name: Decide Deployment Target
      id: target
      run: |
        CURRENT=$(aws elbv2 describe-listeners \
          --query "Listeners[0].DefaultActions[0].TargetGroupArn" \
          --output text)

        if [[ $CURRENT == *"blue"* ]]; then
          echo "env=green" >> $GITHUB_OUTPUT
        else
          echo "env=blue" >> $GITHUB_OUTPUT
        fi

    # 🔥 DEPLOY VIA SSM
    - name: Deploy to EC2
      run: |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=${{ steps.target.outputs.env }}-instance" \
          --query "Reservations[*].Instances[*].InstanceId" \
          --output text)

        aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters commands="[
            \"aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}\",
            \"docker pull ${{ secrets.ECR_URL }}:latest\",
            \"docker stop app || true\",
            \"docker rm app || true\",
            \"docker run -d -p 8080:8080 --name app ${{ secrets.ECR_URL }}:latest\"
          ]"

    # 🔥 SWITCH TRAFFIC
    - name: Switch Traffic
      run: |
        TG_ARN=$(aws elbv2 describe-target-groups \
          --names ${{ steps.target.outputs.env }}-tg \
          --query "TargetGroups[0].TargetGroupArn" \
          --output text)

        LISTENER_ARN=$(aws elbv2 describe-listeners \
          --query "Listeners[0].ListenerArn" \
          --output text)

        aws elbv2 modify-listener \
          --listener-arn $LISTENER_ARN \
          --default-actions Type=forward,TargetGroupArn=$TG_ARN
